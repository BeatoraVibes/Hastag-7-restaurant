<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#7 Restaurant</title>

<style>
body{margin:0;font-family:sans-serif;color:#fff;background:url('https://images.unsplash.com/photo-1541592106381-b31e9677c0e5') center/cover fixed}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:rgba(0,0,0,0.7)}
.menu{padding:15px;background:rgba(0,0,0,0.6)}
.section{margin-bottom:25px}
.section h2{color:#ffd700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#222;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.qty{display:flex;gap:5px}
.qty button{background:#ffd700;border:none;padding:5px 10px;border-radius:5px}
.cart{position:fixed;right:0;top:0;width:300px;height:100%;background:#111;padding:15px;display:none;overflow:auto}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>

<header>
<h2>#7 Restaurant</h2>
<div id="authBox"><button onclick="login()">Login</button></div>
<button onclick="toggleCart()">Cart 🛒</button>
</header>

<div style="padding:10px">
<button onclick="showOrders()" style="background:#ffd700;border:none;padding:8px 12px;border-radius:6px">My Orders</button>
</div>

<div id="ordersPage" style="display:none;padding:15px;background:rgba(0,0,0,0.7)">
<h3>My Orders</h3>
<div id="ordersList"></div>
<button onclick="closeOrders()">Close</button>
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cartBox">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p id="total">Total: ₹0</p>
<button onclick="payNow()">Pay with Razorpay</button>
<button onclick="clearCart()">Cancel</button>
<button onclick="toggleCart()">Close</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const OWNER_WHATSAPP="919021268038";

const firebaseConfig={
 apiKey:"AIzaSyBZa8qNux45ko8RDq-b6bmji-rBuugOTkM",
 authDomain:"sample-restaurant-websit-f6985.firebaseapp.com",
 projectId:"sample-restaurant-websit-f6985",
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null;
auth.onAuthStateChanged(u=>{
 user=u;
 const box=document.getElementById("authBox");
 if(u){
  box.innerHTML=`${u.displayName} <button onclick="logout()">Logout</button>`;
 }else{
  box.innerHTML=`<button onclick="login()">Login</button>`;
 }
});

function login(){
 const provider=new firebase.auth.GoogleAuthProvider();
 auth.signInWithRedirect(provider);
}

function logout(){auth.signOut();}

auth.getRedirectResult();

const menuData={
 "Breakfast":[
  {n:"Bread Butter",p:20},{n:"Toast Bread Butter",p:30},{n:"Bun Maska",p:25},{n:"Cheese Bread Butter",p:45}
 ],
 "Dessert":[
  {n:"Chocolate Brownie",p:99},{n:"Sizzling Brownie",p:139},{n:"Vanilla Ice Cream",p:30}
 ],
 "Tea":[
  {n:"Elaichi Chai",p:12},{n:"Lemon Tea",p:20},{n:"Black Tea",p:15}
 ],
 "Coffee":[
  {n:"Hot Coffee",p:20},{n:"Black Coffee",p:15},{n:"Hot Chocolate Coffee",p:45},{n:"Ukala",p:30}
 ],
 "Pasta":[
  {n:"Red Sauce Pasta",p:89},{n:"White Sauce Pasta",p:99}
 ],
 "Fries":[
  {n:"Salty Fries",p:60},{n:"Peri Peri Fries",p:75}
 ],
 "Sandwich":[
  {n:"Veg Sandwich",p:50},{n:"Veg Cheese Sandwich",p:60},{n:"Masala Sandwich",p:70}
 ],
 "Momos":[
  {n:"Veg Momos",p:70},{n:"Chicken Momos",p:80}
 ],
 "Milkshake":[
  {n:"Vanilla Shake",p:60},{n:"Mango Shake",p:75},{n:"Oreo Shake",p:95}
 ]
};

let cart={};

function render(){
 const m=document.getElementById("menu");
 m.innerHTML="";
 for(let cat in menuData){
  m.innerHTML+=`<div class='section'><h2>${cat}</h2><div class='grid' id='${cat}'></div></div>`;
  const g=document.getElementById(cat);
  menuData[cat].forEach(item=>{
   g.innerHTML+=`<div class='card'>${item.n} ₹${item.p}<div class='qty'><button onclick="change('${item.n}',${item.p},-1)">-</button><span id='q-${item.n}'>0</span><button onclick="change('${item.n}',${item.p},1)">+</button></div></div>`;
  });
 }
}

function change(name,price,val){
 if(!cart[name]) cart[name]={qty:0,price};
 cart[name].qty+=val;
 if(cart[name].qty<=0) delete cart[name];
 document.getElementById(`q-${name}`).innerText=cart[name]?cart[name].qty:0;
 updateCart();
}

function updateCart(){
 let total=0;let html="";
 for(let i in cart){total+=cart[i].qty*cart[i].price;html+=`${i} x${cart[i].qty}<br>`;}
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText="Total: ₹"+total;
}

function toggleCart(){
 const c=document.getElementById("cartBox");
 c.style.display=c.style.display==="block"?"none":"block";
}

function clearCart(){cart={};render();updateCart();}

function generateMsg(paymentId){
 let msg=`Order%0A`;
 for(let i in cart){msg+=`${i} x${cart[i].qty}%0A`;}
 msg+=`Total: ₹${Object.values(cart).reduce((t,i)=>t+i.qty*i.price,0)}%0APaymentID:${paymentId}`;
 return msg;
}

function showOrders(){
 if(!user){alert("Login first");return;}
 document.getElementById("ordersPage").style.display="block";

 db.collection("orders")
 .where("user","==",user.email)
 .orderBy("time","desc")
 .get()
 .then(snapshot=>{
  let html="";
  snapshot.forEach(doc=>{
    const data=doc.data();
    html+="<div style='margin-bottom:10px;border-bottom:1px solid #555;padding:5px'>"+
    "<b>Total:</b> ₹"+data.total+"<br><b>Items:</b><br>";

    for(let i in data.cart){
      html+= i + " x" + data.cart[i].qty + "<br>";
    }

    html+= "<small>" + new Date(data.time.seconds*1000).toLocaleString() + "</small></div>";
  });

  document.getElementById("ordersList").innerHTML= html || "No orders yet";
 });
}

function closeOrders(){
 document.getElementById("ordersPage").style.display="none";
}

function payNow(){
 if(!user){alert("Login first");return;}
 let total=0;for(let i in cart) total+=cart[i].qty*cart[i].price;

 const options={
  key:"rzp_test_SSfbjt7z6btSQf",
  amount:total*100,
  currency:"INR",
  name:"#7 Restaurant",
  handler:function(res){
   db.collection("orders").add({user:user.email,cart,total,time:new Date(),paymentId:res.razorpay_payment_id});
   setTimeout(()=>{
    window.location.href=`https://wa.me/${OWNER_WHATSAPP}?text=${generateMsg(res.razorpay_payment_id)}`;
   },500);
  }
 };
 new Razorpay(options).open();
}

render();
</script>

</body>
</html>
