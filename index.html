<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#7 Restaurant</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111}
.menu{padding:15px}
.section{margin-bottom:25px}
.section h2{color:#ffd700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#222;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.qty{display:flex;gap:5px}
.qty button{background:#ffd700;border:none;padding:5px 10px;border-radius:5px}

.cart{position:fixed;right:0;top:0;width:300px;height:100%;background:#111;padding:15px;display:none;overflow:auto}

@media(max-width:768px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<h2>#7 Restaurant</h2>
<div>
<button onclick="login()">Login</button>
<button onclick="toggleCart()">Cart 🛒</button>
</div>
</header>

<div class="menu" id="menu"></div>

<div class="cart" id="cartBox">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p id="total">Total: ₹0</p>
<button onclick="payNow()">Pay</button>
<button onclick="clearCart()">Cancel</button>
<button onclick="toggleCart()">Close</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBZa8qNux45ko8RDq-b6bmji-rBuugOTkM",
  authDomain: "sample-restaurant-websit-f6985.firebaseapp.com",
  projectId: "sample-restaurant-websit-f6985",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user=null;
auth.onAuthStateChanged(u=>user=u);

function login(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

const menuData={
  "Breakfast":[
    {n:"Bread Butter",p:20},
    {n:"Toast Bread Butter",p:30},
    {n:"Bun Maska",p:25},
    {n:"Cheese Bread Butter",p:45}
  ],
  "Dessert":[
    {n:"Chocolate Brownie",p:99},
    {n:"Sizzling Brownie",p:139},
    {n:"Vanilla Ice Cream",p:30}
  ],
  "Tea":[
    {n:"Elaichi Chai",p:12},
    {n:"Lemon Tea",p:20},
    {n:"Black Tea",p:15}
  ]
};

let cart={};

function render(){
  const m=document.getElementById("menu");
  m.innerHTML="";

  for(let cat in menuData){
    m.innerHTML+=`<div class="section"><h2>${cat}</h2><div class="grid" id="${cat}"></div></div>`;

    const g=document.getElementById(cat);

    menuData[cat].forEach(item=>{
      g.innerHTML+=`
      <div class="card">
        <div>${item.n} - ₹${item.p}</div>
        <div class="qty">
          <button onclick="change('${item.n}',${item.p},-1)">-</button>
          <span id="q-${item.n}">0</span>
          <button onclick="change('${item.n}',${item.p},1)">+</button>
        </div>
      </div>`;
    });
  }
}

function change(name,price,val){
  if(!cart[name]) cart[name]={qty:0,price};
  cart[name].qty+=val;
  if(cart[name].qty<=0) delete cart[name];
  document.getElementById(`q-${name}`).innerText=cart[name]?cart[name].qty:0;
  updateCart();
}

function updateCart(){
  const c=document.getElementById("cartItems");
  c.innerHTML="";
  let total=0;

  for(let i in cart){
    total+=cart[i].qty*cart[i].price;
    c.innerHTML+=`<p>${i} x${cart[i].qty}</p>`;
  }

  document.getElementById("total").innerText="Total: ₹"+total;
}

function toggleCart(){
  const c=document.getElementById("cartBox");
  c.style.display=c.style.display==="block"?"none":"block";
}

function clearCart(){
  cart={};
  render();
  updateCart();
}

function payNow(){
  if(!user){alert("Login first");return;}

  let total=0;
  for(let i in cart) total+=cart[i].qty*cart[i].price;

  db.collection("orders").add({
    user:user.email,
    cart:cart,
    total:total,
    time:new Date()
  }).then(()=>{
    alert("Order Saved!");
    clearCart();
  });
}

render();
</script>

</body>
</html>
