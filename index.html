<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#7 Restaurant</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:#fff}
header{padding:20px;text-align:center;font-size:28px;font-weight:700;background:linear-gradient(90deg,#111,#222)}
.layout{display:flex}
.menu-section{width:60%;padding:20px}
.category{margin-bottom:25px}
.category h2{color:#ffd700;border-left:5px solid #ffd700;padding-left:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{display:flex;justify-content:space-between;align-items:center;background:#1c1c1c;padding:10px;border-radius:10px}
button{background:#ffd700;border:none;padding:6px 10px;border-radius:6px;font-weight:600;cursor:pointer}
.qty-box{display:flex;gap:5px;align-items:center}
.qty-box button{padding:4px 8px}
#cart{position:fixed;right:0;top:0;width:40%;height:100%;background:#181818;padding:20px;overflow:auto}
.cart-item{display:flex;justify-content:space-between;margin:8px 0}
.cart-actions{margin-top:15px;display:flex;gap:10px}
.cancel-btn{background:#ff4d4d;color:#fff}
</style>
</head>
<body>
<header>#7 Restaurant</header>
<div class="layout">
<div class="menu-section" id="menu"></div>
<div id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total">0</span></h3>
<div class="cart-actions">
<button onclick="payNow()">Pay</button>
<button class="cancel-btn" onclick="clearCart()">Cancel</button>
</div>
</div>
</div>
<script>
const OWNER_WHATSAPP = "91XXXXXXXXXX";const menu=[ {cat:"Breakfast",items:[["Bread Butter",20],["Toast Bread Butter",30],["Bun Maska",25],["Cheese Bread Butter",45]]}, {cat:"Dessert",items:[["Chocolate Brownie",99],["Sizzling Brownie",139],["Vanilla Ice Cream",30]]}, {cat:"Tea",items:[["Elaichi Chai",12],["Lemon Tea",20],["Black Tea",15]]}, {cat:"Coffee",items:[["Hot Coffee",20],["Black Coffee",15],["Hot Chocolate Coffee",45],["Dairy Milk Hot Chocolate",40],["Hot Chocolate",35],["Ukala",30]]}, {cat:"Pasta",items:[["Red Sauce Pasta",89],["White Sauce Pasta",99]]}, {cat:"Fries",items:[["Salty Fries",60],["Peri Peri Fries",75]]}, {cat:"Sandwich",items:[["Veg Normal Sandwich",50],["Veg Cheese Sandwich",60],["Masala Cheese Sandwich",70],["7 Special Veg Club",140]]}, {cat:"Momos",items:[["Veg Momos",70],["Chicken Momos",80]]}, {cat:"Milkshake",items:[["Vanilla Shake",60],["Cold Coffee",70],["Mango Shake",75],["Strawberry Shake",75],["Chocolate Shake",80],["Oreo Shake",95],["Kitkat Shake",95]]} ];

let cart={};

function renderMenu(){ let m=document.getElementById("menu"); menu.forEach(c=>{ let div=document.createElement("div"); div.className="category"; div.innerHTML=<h2>${c.cat}</h2><div class='grid'></div>; let grid=div.querySelector(".grid");

c.items.forEach(i=>{ let id=i[0].replace(/[^a-zA-Z0-9]/g,""); let el=document.createElement("div"); el.className="item"; el.innerHTML=`<span>${i[0]} - ₹${i[1]}</span>

<div class="qty-box">
<button onclick="decrease('${id}','${i[0]}',${i[1]})">-</button>
<span id="qty-${id}">0</span>
<button onclick="increase('${id}','${i[0]}',${i[1]})">+</button>
</div>`;
grid.appendChild(el);
});m.appendChild(div); }); }

function increase(id,name,price){ if(!cart[id]) cart[id]={name,price,qty:0}; cart[id].qty++; document.getElementById(qty-${id}).innerText=cart[id].qty; updateCart(); }

function decrease(id,name,price){ if(cart[id] && cart[id].qty>0){ cart[id].qty--; document.getElementById(qty-${id}).innerText=cart[id].qty; if(cart[id].qty===0) delete cart[id]; updateCart(); } }

function updateCart(){ let c=document.getElementById("cartItems"); c.innerHTML=""; let total=0; Object.values(cart).forEach(item=>{ let amount=item.qty*item.price; total+=amount; let div=document.createElement("div"); div.className="cart-item"; div.innerHTML=${item.name} x${item.qty} <span>₹${amount}</span>; c.appendChild(div); }); document.getElementById("total").innerText=total; }

function clearCart(){ cart={}; document.querySelectorAll('[id^="qty-"]').forEach(el=>el.innerText='0'); updateCart(); alert("Cart cleared"); }

function generateMsg(paymentId){ let msg="New Order:%0A"; Object.values(cart).forEach(i=>{ msg+=${i.name} x${i.qty} = ₹${i.qty*i.price}%0A; }); msg+=Total: ₹${document.getElementById("total").innerText}%0A; msg+=Payment ID: ${paymentId}; return msg; }

function payNow(){ let total=document.getElementById("total").innerText; if(total==0){alert("Cart empty");return;}

var options={ key:"YOUR_RAZORPAY_KEY", amount:total*100, currency:"INR", name:"#7 Restaurant", handler:function(res){ alert("Payment Success"); let url=https://wa.me/${OWNER_WHATSAPP}?text=${generateMsg(res.razorpay_payment_id)}; window.open(url,'_blank'); clearCart(); } };

new Razorpay(options).open(); }

renderMenu(); </script>

</body>
</html>
